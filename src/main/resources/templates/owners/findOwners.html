<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <h2 th:text="#{findOwners}">Find Owners</h2>

  <form th:object="${owner}" th:action="@{/owners}" method="get" class="form-horizontal" id="search-owner-form">
    <div th:if="${#fields.hasAnyErrors()}" class="alert alert-warning" role="alert">
      <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
    </div>
    <div class="form-group has-feedback">
      <input th:replace="~{fragments/inputField :: input (#{firstName}, 'firstName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{lastName}, 'lastName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{city}, 'city', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{telephone}, 'telephone', 'text')}" />
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10 d-flex flex-wrap gap-2">
        <button type="submit" class="btn btn-primary mt-0" th:text="#{findOwner}">Find Owner</button>
        <a class="btn btn-outline-secondary mt-0" th:href="@{/owners/find}" th:text="#{resetSearch}">Reset</a>
        <a class="btn btn-primary mt-0" th:href="@{/owners/new}" th:text="#{addOwner}">Add Owner</a>
      </div>
    </div>

  </form>

</body>

</html>
