<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'vets')}">

<body>

  <h2 th:text="#{editVetSpecialties}">Edit Vet Specialties</h2>

  <div th:if="${message}" class="alert alert-success" id="success-message">
    <span th:text="${message}"></span>
  </div>

  <div th:if="${error}" class="alert alert-danger" id="error-message">
    <span th:text="${error}"></span>
  </div>

  <form th:object="${vet}" class="form-horizontal" id="edit-vet-form" method="post">
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label" th:text="#{name}">Name</label>
        <div class="col-sm-10">
          <p class="form-control-plaintext mb-0" th:text="*{firstName + ' ' + lastName}">Vet Name</p>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label" th:text="#{specialtySelection}">Select Specialties</label>
        <div class="col-sm-10">
          <div class="specialty-picker">
            <div class="form-check" th:each="specialty : ${specialties}">
              <input class="form-check-input" type="checkbox" th:field="*{specialties}" th:value="${specialty}"
                th:id="${'specialty-' + specialty.id}" />
              <label class="form-check-label" th:for="${'specialty-' + specialty.id}" th:text="${specialty.name}">
                radiology
              </label>
            </div>
          </div>
          <small class="form-text text-muted" th:text="#{specialtyHelp}">
            Select one or more specialties.
          </small>
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10 d-flex gap-2 flex-wrap">
        <button class="btn btn-primary mt-0" type="submit" th:text="#{saveVetSpecialties}">Save Specialties</button>
        <a class="btn btn-outline-secondary mt-0" th:href="@{/vets.html}" th:text="#{vets}">Back</a>
      </div>
    </div>
  </form>
  <script>
    function hideMessages() {
      setTimeout(function () {
        const success = document.getElementById("success-message");
        const error = document.getElementById("error-message");
        if (success) {
          success.style.display = "none";
        }
        if (error) {
          error.style.display = "none";
        }
      }, 3000);
    }

    hideMessages();
  </script>
</body>

</html>
